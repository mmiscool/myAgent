<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Project Desk</title>
  </head>
  <body>
    <div class="shell">
      <main class="layout" id="appLayout">
        <aside class="panel panel-sidebar" id="sidebarPanel">
          <div class="toolbar sidebar-toolbar sidebar-projects-toolbar">
            <button
              data-action="toggle-sidebar"
              class="icon-button"
              id="sidebarToggleButton"
              type="button"
              aria-pressed="false"
              aria-label="Collapse sidebar"
              title="Collapse sidebar"
            ><span aria-hidden="true">&lt;</span></button>
            <button data-action="toggle-project-adder" class="icon-button" title="Add project">+</button>
            <button
              data-action="toggle-archived"
              class="ghost-button small sidebar-filter-button"
              id="archivedToggle"
              type="button"
              aria-pressed="false"
            >Active</button>
          </div>

          <form id="projectQuickAddForm" class="sidebar-adder hidden">
            <input type="text" id="projectPathInput" name="cwd" placeholder="/path/to/project">
            <button type="submit" class="ghost-button">Add Project</button>
          </form>

          <div class="sidebar-project-selector">
            <label class="sidebar-section-label" for="projectSelect">Project</label>
            <select id="projectSelect" class="sidebar-project-select" aria-label="Active project"></select>
          </div>

          <div class="sidebar-conversations-wrap">
            <div class="sidebar-list-header">
              <span class="sidebar-section-label">Conversations</span>
            </div>
            <div id="projectList" class="sidebar-conversations"></div>
          </div>
        </aside>

        <div
          id="sidebarResizeHandle"
          class="sidebar-resize-handle"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize sidebar"
          tabindex="0"
        >
          <button
            id="sidebarRailToggle"
            class="sidebar-rail-toggle"
            data-action="toggle-sidebar"
            type="button"
            aria-pressed="false"
            aria-label="Collapse sidebar"
            title="Collapse sidebar"
          ><span aria-hidden="true">&lt;</span></button>
        </div>

        <section class="panel panel-conversation">
          <div id="threadHeader" class="thread-header"></div>
          <div id="conversation" class="thread-pane-host" aria-live="polite"></div>
          <form id="composerForm" class="composer hidden" aria-hidden="true">
            <div id="composerAttachments" class="composer-attachments hidden"></div>
            <textarea id="promptInput" name="text" rows="5" placeholder="Ask Codex to inspect, edit, review, search, run commands, or delegate inside the selected project."></textarea>
            <div class="composer-row composer-footer">
              <button type="submit" class="primary-button">Send</button>
              <div class="composer-settings">
                <button
                  id="composerSettingsButton"
                  type="button"
                  class="ghost-button composer-settings-button"
                  data-action="toggle-composer-settings"
                  aria-haspopup="menu"
                  aria-expanded="false"
                >Settings</button>
                <div id="composerSettingsMenu" class="composer-settings-menu hidden" aria-label="Composer settings">
                  <div class="composer-controls">
                    <div class="composer-picker">
                      <button id="composerModelButton" type="button" class="composer-picker-trigger" data-action="toggle-composer-menu" data-menu="model" aria-haspopup="listbox" aria-expanded="false">
                        <span class="composer-picker-icon" aria-hidden="true">◎</span>
                        <span id="composerModelLabel" class="composer-picker-label">Model</span>
                      </button>
                      <div id="composerModelMenu" class="composer-picker-menu hidden" role="listbox" aria-label="Model"></div>
                    </div>
                    <div class="composer-picker">
                      <button id="composerEffortButton" type="button" class="composer-picker-trigger" data-action="toggle-composer-menu" data-menu="effort" aria-haspopup="listbox" aria-expanded="false">
                        <span id="composerEffortLabel" class="composer-picker-label">Reasoning</span>
                      </button>
                      <div id="composerEffortMenu" class="composer-picker-menu hidden" role="listbox" aria-label="Reasoning"></div>
                    </div>
                    <button id="composerModeButton" type="button" class="composer-mode-button" data-action="toggle-composer-mode" aria-pressed="false">Chat</button>
                    <label class="composer-toggle composer-toggle-inline">
                      <input id="autoscrollToggle" type="checkbox" checked>
                      <span>Autoscroll</span>
                    </label>
                    <label class="composer-toggle composer-toggle-inline composer-dangerous-toggle">
                      <input id="approveAllDangerousToggle" type="checkbox">
                      <span>Approve all dangerous</span>
                    </label>
                    <label class="composer-toggle composer-toggle-inline composer-ralph-loop-toggle">
                      <input id="ralphLoopToggle" type="checkbox">
                      <span>Ralph loop</span>
                    </label>
                    <label class="composer-number-control composer-ralph-loop-limit" for="ralphLoopLimitInput">
                      <span class="composer-number-control-copy">
                        <span class="composer-number-control-label">Ralph loop count</span>
                        <span class="composer-number-control-hint">0 keeps looping until you stop it</span>
                      </span>
                      <input id="ralphLoopLimitInput" class="composer-number-input" type="number" min="0" step="1" inputmode="numeric" value="0">
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </section>

      </main>
    </div>

    <div id="ralphLoopModal" class="ralph-loop-modal hidden" aria-hidden="true">
      <div class="ralph-loop-dialog" role="dialog" aria-modal="true" aria-labelledby="ralphLoopDialogTitle" aria-describedby="ralphLoopDialogDescription">
        <div class="ralph-loop-dialog-mark">Ralph Loop</div>
        <h2 id="ralphLoopDialogTitle" class="ralph-loop-dialog-title">Continuing in <span id="ralphLoopCountdownValue">15 seconds</span></h2>
        <p id="ralphLoopDialogDescription" class="ralph-loop-dialog-description">The next loop will start automatically when the countdown finishes.</p>
        <div class="ralph-loop-countdown" aria-live="polite" aria-atomic="true">
          <span id="ralphLoopCountdownNumber" class="ralph-loop-countdown-number">15</span>
          <span id="ralphLoopCountdownLabel" class="ralph-loop-countdown-label">seconds remaining</span>
        </div>
        <div class="ralph-loop-dialog-actions">
          <button type="button" class="ghost-button" data-action="cancel-ralph-loop">Cancel Ralph loop</button>
        </div>
      </div>
    </div>

    <div id="imageEditorModal" class="image-editor-modal hidden" aria-hidden="true">
      <div class="image-editor-shell">
        <div class="image-editor-toolbar">
          <div class="image-editor-tools">
            <button type="button" class="image-tool-button" data-action="editor-tool" data-tool="select">Select</button>
            <button type="button" class="image-tool-button" data-action="editor-tool" data-tool="crop">Crop</button>
            <button type="button" class="image-tool-button" data-action="editor-tool" data-tool="rect">Rect</button>
            <button type="button" class="image-tool-button" data-action="editor-tool" data-tool="line">Line</button>
            <button type="button" class="image-tool-button" data-action="editor-tool" data-tool="arrow">Arrow</button>
            <label class="image-color-control">
              <span>Color</span>
              <input id="imageEditorColor" type="color" value="#d100ff">
            </label>
          </div>
          <div class="image-editor-actions">
            <button type="button" class="ghost-button" data-action="close-image-editor">Cancel</button>
            <button type="button" class="primary-button" data-action="apply-image-editor">Apply</button>
          </div>
        </div>
        <div class="image-editor-stage">
          <div id="imageEditorCanvasWrap" class="image-editor-canvas-wrap">
            <img id="imageEditorPreviewImage" class="image-editor-preview-image" alt="Attachment preview">
            <canvas id="imageEditorOverlayCanvas" class="image-editor-canvas image-editor-overlay"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
