<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conversation</title>
    <style>
      html, body {
        height: 100%;
      }

      body {
        margin: 0;
      }

      .pane-frame-shell {
        height: 100%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 5px;
        background:
          radial-gradient(circle at top right, rgba(74, 163, 255, 0.08), transparent 25%),
          linear-gradient(180deg, #161718 0%, #111213 100%);
      }

      .pane-chat-header {
        flex: 0 0 auto;
      }

      .conversation {
        flex: 1 1 auto;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div class="pane-frame-shell">
      <div id="chatPaneHeader" class="pane-chat-header"></div>
      <div id="conversation" class="conversation"></div>
      <div id="chatPaneComposer"></div>
    </div>
    <script type="module" src="/src/chat-pane.js"></script>
  </body>
</html>
