<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Session Console</title>
    <script type="module" src="/src/x-session.js"></script>
  </head>
  <body>
    <div class="xsession-shell">
      <aside class="xsession-sidebar">
        <div class="xsession-brand">
          <div>
            <p class="xsession-kicker">Remote X</p>
            <h1>X Session</h1>
          </div>
          <a class="xsession-link" href="/">Project Desk</a>
        </div>

        <form id="sessionForm" class="xsession-form">
          <label>
            Command
            <textarea id="command" rows="6" placeholder="xterm"></textarea>
          </label>
          <label>
            Window manager command
            <input id="windowManagerCommand" type="text" value="openbox" placeholder="openbox">
          </label>
          <button type="submit" class="xsession-primary">Start Session</button>
        </form>

        <div class="xsession-section">
          <div class="xsession-section-head">
            <h2>Sessions</h2>
            <button id="refreshSessions" type="button" class="xsession-ghost">Refresh</button>
          </div>
          <div id="sessionList" class="xsession-list"></div>
        </div>
      </aside>

      <main class="xsession-main">
        <section class="xsession-display-card">
          <div class="xsession-display-bar">
            <div id="clientMeta" class="xsession-status">Browser client idle.</div>
            <div class="xsession-display-actions">
              <label class="xsession-inline-field">
                <span>Scale</span>
                <select id="resolutionScale">
                  <option value="0.75" selected>0.75x</option>
                  <option value="1">1.0x</option>
                  <option value="1.25">1.25x</option>
                  <option value="1.5">1.5x</option>
                  <option value="2">2.0x</option>
                </select>
              </label>
              <button id="stopSelected" type="button" class="xsession-danger">Stop</button>
            </div>
          </div>
          <div class="xsession-canvas-wrap">
            <canvas id="screenCanvas" class="xsession-canvas"></canvas>
          </div>
        </section>
      </main>
    </div>
  </body>
  </html>
